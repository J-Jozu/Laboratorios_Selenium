name: Selenium Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas (modo debug)
        run: |
          echo "=== UBICACION ACTUAL ==="
          pwd

          echo "=== ARCHIVOS ==="
          ls -R

          echo "=== EJECUTANDO PYTEST ==="
          python -m pytest tu-proyecto/Lab2 --html=reporte_final.html --self-contained-html || true

          echo "=== DESPUES DE PYTEST ==="
          ls -la
          
      - name: Ver archivos generados
        run: |
          echo "Contenido del directorio:"
          ls -la

      - name: Guardar el Reporte HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-selenium
          path: reporte_final.html